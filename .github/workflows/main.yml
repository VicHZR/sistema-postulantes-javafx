name: Java CI con Maven (JavaFX)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compilar y Ejecutar Pruebas con Maven
      # verify ejecuta: compilación, tests y empaquetado inicial
      run: mvn -B clean verify

    - name: Verificar errores de compilación
      if: failure()
      run: echo "La compilación o los tests fallaron. Revisa el log de Maven arriba."
